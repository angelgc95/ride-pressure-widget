name: RidePressureIOS
options:
  minimumXcodeGenVersion: 2.45.3
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  RidePressure:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - target: RidePressureWidget
        embed: true
    sources:
      - path: RidePressureApp
      - path: Shared
    resources:
      - path: Resources
    entitlements:
      path: RidePressureApp/RidePressure.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.angel.ridepressure
        PRODUCT_NAME: RidePressure
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Ride Pressure
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Ride Pressure uses your location to choose your current city automatically.
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
  RidePressureWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RidePressureWidget
      - path: Shared
      - path: RidePressureApp/Models/MarketModels.swift
      - path: RidePressureApp/App/Theme.swift
      - path: RidePressureApp/Services/HTTPClient.swift
      - path: RidePressureApp/Services/OpenMeteoService.swift
      - path: RidePressureApp/Services/SnapshotArchive.swift
      - path: RidePressureApp/Services/ProviderAdapters.swift
      - path: RidePressureApp/Services/MarketEngine.swift
    entitlements:
      path: RidePressureWidget/RidePressureWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.angel.ridepressure.widget
        PRODUCT_NAME: RidePressureWidget
        INFOPLIST_FILE: RidePressureWidget/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        TARGETED_DEVICE_FAMILY: "1"
